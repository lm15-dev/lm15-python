name: python2

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e . pytest pytest-asyncio pyyaml
      - name: Tests
        run: python -m pytest tests/ -q
      - name: Conformance (strict)
        run: python conformance/run_all.py --strict
      - name: Vet shim smoke test
        # Skips itself when the lm15-contract corpus is not checked out as a
        # sibling (its pytestmark handles that); still proves the shim imports
        # and speaks the JSONL framing.
        run: |
          if [ -f tests/test_vet_shim.py ]; then
            python -m pytest tests/test_vet_shim.py -q
          else
            echo "tests/test_vet_shim.py not present; skipping"
          fi
