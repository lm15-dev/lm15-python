          - Controlling generation: cookbooks/04-generation-config.md
          - Streaming: cookbooks/05-streaming.md
      - Tools:
          - Function tools: cookbooks/06-function-tools.md
          - Built-in provider tools: cookbooks/07-builtin-tools.md
          - Structured output: cookbooks/08-structured-output.md
      - Modalities:
          - Images, PDFs & documents: cookbooks/09-images-and-documents.md
